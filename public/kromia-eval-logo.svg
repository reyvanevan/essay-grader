<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Background: Sleek Dark / iOS Style Rounded Rect -->
  <rect width="100" height="100" rx="24" fill="url(#grad)" />

  <!-- Core Element: The Evolving K / Evaluation Node -->
  <!-- Left Pillar of K -->
  <path d="M35 25 L35 75" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
  
  <!-- Right upper branch turning into a Sparkle/Node -->
  <path d="M35 50 L65 25" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
  
  <!-- Right lower branch (Evaluation Path) -->
  <path d="M35 50 L65 75" stroke="#E2E8F0" stroke-width="8" stroke-linecap="round" />

  <!-- The AI Sparkle/Core overriding the upper branch -->
  <path d="M70 20 Q70 15 75 15 Q70 15 70 10 Q70 15 65 15 Q70 15 70 20 Z" fill="#6366F1" />
  <path d="M65 30 Q65 27 68 27 Q65 27 65 24 Q65 27 62 27 Q65 27 65 30 Z" fill="#818CF8" />

  <defs>
    <!-- Premium Gradient Background -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
  </defs>
</svg>
